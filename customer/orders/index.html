<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My orders | Clip Services</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#8B3A3A">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--t:#8B3A3A;--c:#F5F0E8;--b:#2C1810;--card:#fffdf8;--line:#E8DFD4;--gold:#D4A017;--g:#0d9488;--a:#d97706;--p:#7c3aed;--d:#16a34a}
*{box-sizing:border-box}
body{margin:0;font-family:"DM Sans",system-ui,sans-serif;background:var(--c);color:var(--b);padding:20px 16px 48px;line-height:1.5}
.wrap{max-width:640px;margin:0 auto}
h1{font-size:1.5rem;color:var(--t);margin:0 0 6px}
h2{font-size:1.1rem;color:var(--t);margin:28px 0 12px}
.muted{color:#5c4033;font-size:.92rem}
a{color:var(--t);font-weight:600}
.email-row{display:flex;flex-direction:column;gap:8px;margin:16px 0}
@media (min-width:480px){.email-row{flex-direction:row;align-items:center}}
.email-row input{flex:1;padding:14px 14px;border-radius:12px;border:1px solid var(--line);font:inherit;min-height:48px}
.btn{display:inline-block;background:var(--t);color:#fff;font-weight:700;padding:14px 20px;border-radius:12px;border:none;cursor:pointer;font-size:1rem;min-height:48px}
.btn-ghost{background:transparent;color:var(--t);border:2px solid var(--t)}
.btn-block{display:block;width:100%;text-align:center;text-decoration:none}
.card{background:var(--card);border:1px solid rgba(139,58,58,.2);border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 4px 20px rgba(44,24,16,.04)}
.card h3{margin:0 0 4px;font-size:1.05rem;color:var(--t)}
.ops{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.ops a,.ops button{min-height:44px;padding:10px 14px;border-radius:10px;font-size:.95rem;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
/* Progress tracker: horizontal on wide, vertical on narrow */
.trk{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin:12px 0 8px}
@media (max-width:520px){
  .trk{grid-template-columns:1fr;gap:6px}
}
.tstep{font-size:11px;text-align:center;padding:10px 6px;border-radius:10px;border:2px solid var(--line);background:#fff}
.tstep .dot{font-size:1rem;line-height:1.2}
.tstep.done{border-color:var(--d);background:#f0fdf4}
.tstep.current{border-color:var(--a);background:#fffbeb;box-shadow:0 0 0 1px var(--a)}
.tstep .lbl{display:block;font-weight:600;margin-top:4px;color:var(--b);font-size:10px}
.pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
.st-new{background:#fee2e2;color:#991b1b}
.st-confirmed{background:#fef3c7;color:#92400e}
.st-prep{background:#e0e7ff;color:#3730a3}
.st-ready{background:#ede9fe;color:#5b21b6}
.st-comp{background:#dcfce7;color:#14532d}
.badge-pending{background:#f3f4f6;color:#4b5563}
.items{font-size:13px;color:#444;margin:6px 0}
.total{font-weight:700;margin-top:6px}
.inactive{opacity:.75}
.empty{text-align:center;padding:32px 16px}
.empty p{margin:8px 0}
</style>
</head>
<body>
<div class="wrap">
  <p><a href="/">← Home</a> · <a href="/stores">Browse stores</a></p>
  <h1>Your orders</h1>
  <p class="muted">Guest access — enter the <strong>same email</strong> you used at checkout. No password.</p>

  <div class="email-row">
    <label for="em" class="muted" style="min-width:120px">Order email</label>
    <input type="email" id="em" name="email" autocomplete="email" placeholder="you@example.com" />
    <button type="button" class="btn" id="load">Show my orders</button>
  </div>
  <p class="err" id="e" style="color:#b91c1c;font-size:.9rem"></p>

  <div id="content" style="display:none">
    <h2>Active orders</h2>
    <div id="active"></div>
    <h2>Order history</h2>
    <div id="history"></div>
  </div>

  <div class="empty" id="empty" style="display:none">
    <h2 style="border:none;margin:0">No orders yet</h2>
    <p class="muted">Browse stores, add to basket, and check out in minutes.</p>
    <a class="btn btn-block" href="/stores" style="max-width:280px;margin:16px auto 0">Browse stores</a>
  </div>
</div>
<script>
(function(){
  var LS = "clipCustomerEmail";
  var em = document.getElementById("em");
  var q = new URLSearchParams(location.search);
  if (q.get("email")) { em.value = q.get("email").trim(); }
  else { try { var s = localStorage.getItem(LS); if (s) em.value = s; } catch (e) {} }

  var ST = ["new","confirmed","preparing","en_route","ready","completed"];

  function money(n) {
    if (n == null || n === "") return "—";
    return "£" + Number(n).toFixed(2);
  }

  function stagePill(st) {
    var map = {
      new: ["st-new", "Placed"],
      confirmed: ["st-confirmed", "Confirmed"],
      preparing: ["st-prep", "Preparing"],
      ready: ["st-ready", "Ready"],
      completed: ["st-comp", "Complete"]
    };
    var x = map[st] || ["badge-pending", st || "—"];
    return '<span class="pill ' + x[0] + '">' + x[1] + "</span>";
  }

  function estLine(o) {
    if (o.fulfillment === "delivery") return "Estimated delivery: 30–60 minutes — the store will confirm on WhatsApp.";
    var c = o.storeCity ? (o.storeCity + " — ") : "";
    return c + "Ready in approximately 2 hours once the store confirms (WhatsApp).";
  }

  function waUrl(phone, pre) {
    var d = String(phone || "").replace(/\D/g, "");
    if (d.length < 10) return "";
    if (d.charAt(0) === "0") d = "44" + d.slice(1);
    else if (d.slice(0, 2) !== "44") d = "44" + d;
    var u = "https://wa.me/" + d;
    if (pre) u += "?text=" + encodeURIComponent(pre);
    return u;
  }

  function lineItems(cart) {
    if (!cart || !cart.length) return "—";
    return cart.map(function(l) {
      return (l.qty || 0) + "× " + esc(String(l.item || "Item"));
    }).join(" · ");
  }

  function trackerHTML(o) {
    if (o.status && o.status !== "paid") {
      return '<p class="muted" style="margin:8px 0">Payment not completed for this order.</p>';
    }
    var st = o.storeStage || "new";
    var isDel = o.fulfillment === "delivery";
    var dLabel = isDel ? "On the way" : "—";
    var rLabel = isDel ? "Out for delivery" : "Ready for collection";
    var lines = [
      { icon: "🟢", name: "Order placed" },
      { icon: "🟡", name: "Confirmed" },
      { icon: "🔵", name: "Being prepared" },
      { icon: "🚗", name: dLabel },
      { icon: "🟣", name: rLabel },
      { icon: "✅", name: "Complete" }
    ];
    if (!isDel) {
      lines[3] = { icon: "⬜", name: "—" };
    }
    var cur = st === "completed" ? 5 : ST.indexOf(st);
    if (cur < 0) cur = 0;
    var h = '<div class="trk" style="grid-template-columns:repeat(6,1fr)" role="list">';
    for (var i = 0; i < 6; i++) {
      var cl = "tstep";
      if (st === "completed") cl = "tstep done";
      else if (i < cur) cl = "tstep done";
      else if (i === cur) cl = "tstep current";
      h += '<div class="' + cl + '" role="listitem"><span class="dot" aria-hidden="true">' + lines[i].icon + '</span><span class="lbl">' + lines[i].name + "</span></div>";
    }
    h += "</div>";
    return h;
  }

  function reviewLink(o) {
    var m = (em.value || "").trim();
    if (!m) return "/customer/review/?ref=" + encodeURIComponent(o.ref) + "&email=";
    return "/customer/review/?ref=" + encodeURIComponent(o.ref) + "&email=" + encodeURIComponent(m);
  }

  function cardHTML(o) {
    var isHist = o.storeStage === "completed";
    var inactive = !o.storeActive;
    var w = o.storeWhatsApp || "";
    var wMsg = w ? waUrl(w, "Hi — following up on my order " + o.ref) : "";
    var lines = lineItems(o.cartSnapshot);
    var h = '<div class="card' + (inactive ? " inactive" : "") + '"><h3>' + esc(o.storeName) + " · " + esc(o.ref) + "</h3>";
    h += "<p>" + stagePill(o.storeStage) + (o.fulfillment === "delivery" ? " · <span class=\"muted\">Delivery</span>" : " · <span class=\"muted\">Collection</span>") + "</p>";
    if (inactive) h += '<p class="muted" style="margin:8px 0">This store is no longer available for new orders. For questions about a past order, you can still try WhatsApp if shown.</p>';
    h += '<p class="items">' + esc(lines) + "</p><p class="total">Total " + money(o.totalGBP) + "</p>";
    if (o.paidAt) h += '<p class="muted" style="font-size:12px;margin:6px 0 0">Paid ' + esc(o.paidAt.slice(0, 10)) + "</p>";
    if (isHist && o.customerReviewRating != null && o.customerReviewRating >= 1) {
      h += '<p class="muted" style="font-size:13px">Your rating: ★ ' + Number(o.customerReviewRating).toFixed(0) + "/5</p>";
    }
    if (!isHist) {
      h += trackerHTML(o);
      h += '<p class="muted" style="font-size:12px">' + estLine(o) + "</p>";
    }
    h += '<div class="ops">';
    if (wMsg) h += '<a class="btn" style="background:var(--g);color:#fff" href="' + wMsg + '" target="_blank" rel="noopener">Message store</a>';
    if (!inactive && o.listingId) {
      h += '<button type="button" class="btn-ghost" data-reorder="' + esc(o.ref) + '">Reorder</button>';
    } else if (inactive) {
      h += '<span class="muted" style="align-self:center;font-size:13px">Reorder unavailable</span>';
    }
    if (isHist && !o.customerReviewSubmitted) {
      h += '<a class="btn-ghost" href="' + reviewLink(o) + '">Leave a review</a>';
    }
    h += '<a class="btn-ghost" href="/customer/order-confirmed?ref=' + encodeURIComponent(o.ref) + '">View receipt</a></div></div>';
    return h;
  }

  function esc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/\"/g, "&quot;");
  }

  function onReorder(e) {
    var ref = e.target.getAttribute("data-reorder");
    if (!ref) return;
    var o = (window._orders || []).find(function(x) { return x.ref === ref; });
    if (!o) return;
    if (!o.storeActive) { alert("This store is no longer available."); return; }
    if (!o.listingId) return;
    var c = {};
    var want = 0;
    (o.cartSnapshot || []).forEach(function(l) {
      if (l.qty) want++;
      if (l.idx != null && l.qty) c[String(l.idx)] = parseInt(l.qty, 10) || 0;
    });
    if (!Object.keys(c).length) { alert("Could not copy this basket. Open the store and add products again."); return; }
    if (want > Object.keys(c).length) {
      try { sessionStorage.setItem("clip_reorder_note", "Some line items are no longer on the menu and were skipped."); } catch (e) {}
    }
    try { localStorage.setItem("clipCart:" + o.listingId, JSON.stringify(c)); } catch (e2) {}
    var path = o.storeSlug ? "/stores/" + encodeURIComponent(o.storeSlug) : "/store/" + encodeURIComponent(o.listingId);
    location.href = path;
  }

  function render(orders) {
    window._orders = orders;
    var active = orders.filter(function(o) {
      if (o.status === "paid" && o.storeStage === "completed") return false;
      return true;
    });
    var hist = orders.filter(function(o) { return o.status === "paid" && o.storeStage === "completed"; });
    if (!orders.length) {
      document.getElementById("content").style.display = "none";
      document.getElementById("empty").style.display = "block";
      return;
    }
    document.getElementById("empty").style.display = "none";
    document.getElementById("content").style.display = "block";
    document.getElementById("active").innerHTML = active.length ? active.map(function(o) { return cardHTML(o); }).join("") : '<p class="muted">No active orders. Completed orders appear below.</p>';
    document.getElementById("history").innerHTML = hist.length ? hist.map(function(o) { return cardHTML(o); }).join("") : '<p class="muted">No completed orders yet.</p>';
    if (active.length) {
      try { window.__CLIP_FIRST_ORDER_REF = active[0].ref; } catch (e) {}
    }
    document.getElementById("content").onclick = function(ev) {
      var t = ev.target && ev.target.closest && ev.target.closest("[data-reorder]");
      if (!t) return;
      onReorder({ target: t });
    };
  }

  function load() {
    var m = (em.value || "").trim();
    var err = document.getElementById("e");
    err.textContent = "";
    if (m.length < 5) { err.textContent = "Enter a valid email."; return; }
    try { localStorage.setItem(LS, m); } catch (e) {}
    history.replaceState(null, "", "/customer/orders/?email=" + encodeURIComponent(m));
    fetch("/api/customer-orders?email=" + encodeURIComponent(m))
      .then(function(r) { return r.json(); })
      .then(function(j) {
        if (!j || !j.ok) { err.textContent = (j && j.error) || "Could not load."; return; }
        render(j.orders || []);
      })
      .catch(function() { err.textContent = "Network error."; });
  }

  document.getElementById("load").onclick = load;
  if (q.get("email") && (q.get("email") + "").indexOf("@") > 0) { load(); }
  try { if (/[?&]src=wa(?:&|$)/.test(location.search)) sessionStorage.setItem("clipOrderSource", "wa"); } catch (_e) {}
})(); 
</script>
<script src="/js/clip-whatsapp-float.js" defer></script>
</body>
</html>
